# Render Blueprint — AI PMO Viewer
# https://render.com/docs/blueprint-spec
#
# Render dashboard で "New +" → "Blueprint" → リポ keitaurano-del/ai-pmo を選択すると
# 本ファイルを基に Static Site が作成される。
#
# サイト URL は自動採番（例: https://ai-pmo-viewer.onrender.com）
# Push 連動: main ブランチへの push で自動再デプロイ
services:
  - type: web
    name: ai-pmo-viewer
    runtime: static
    rootDir: viewer
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
